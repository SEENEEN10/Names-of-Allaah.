<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بأسمائه نحيا — الأسماء الحسنى</title>
  <meta name="description" content="أسماء الله الحسنى — اضغط على أي اسم للانتقال مباشرةً إلى قراءته">

  <!-- ── INSTANT-NAVIGATION PREFETCH ─────────────────────────────────────
       Prefetch reader + all 7 part files in the background so clicking
       any name opens instantly from browser cache. Browsers schedule
       these at idle/low priority and skip them automatically when the
       user is on Save-Data mode or a slow connection.                 -->
  <link rel="prefetch" href="reader.html" as="document">
  <link rel="prefetch" href="chapters/part1-full.html" as="fetch">
  <link rel="prefetch" href="chapters/part2-full.html" as="fetch">
  <link rel="prefetch" href="chapters/part3-full.html" as="fetch">
  <link rel="prefetch" href="chapters/part4-full.html" as="fetch">
  <link rel="prefetch" href="chapters/part5-full.html" as="fetch">
  <link rel="prefetch" href="chapters/part6-full.html" as="fetch">
  <link rel="prefetch" href="chapters/part7-full.html" as="fetch">
  <link rel="preload"  href="assets/uthmanic-hafs.otf" as="font" type="font/otf" crossorigin="anonymous">
  <style>
    :root {
      --bg:     #f7f1ea;
      --card:   #ffffff;
      --text:   #22150c;
      --muted:  #6d5b50;
      --accent: #8e4218;
      --a2:     #d8b59a;
      --border: rgba(142,66,24,.12);
      --shadow: 0 6px 22px rgba(49,27,16,.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia,"Times New Roman",serif;
      min-height: 100vh;
    }

    /* ── HERO ──────────────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 2.4rem 1.5rem 1.8rem;
      background: linear-gradient(180deg,rgba(255,255,255,.72),transparent);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      color: var(--accent);
      font-size: clamp(1.8rem,5vw,2.6rem);
      line-height: 1.2;
      margin-bottom: .4rem;
    }
    .hero-sub {
      color: var(--muted);
      font-size: .98rem;
      font-family: system-ui,sans-serif;
      line-height: 1.7;
    }

    /* ── CONTINUE READING BANNER ───────────────────────────────────── */
    #banner {
      display: none;               /* shown by JS when position saved */
      max-width: 820px;
      margin: 1.2rem auto 0;
      background: var(--card);
      border: 1px solid var(--a2);
      border-radius: 14px;
      padding: .95rem 1.3rem;
      box-shadow: var(--shadow);
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      flex-wrap: wrap;
    }
    #banner.visible { display: flex; }
    .banner-txt {
      font-family: system-ui,sans-serif;
      font-size: .9rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .banner-txt strong { color: var(--accent); }
    .cont-btn {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .52rem 1.1rem; min-height: 42px;
      background: linear-gradient(135deg, var(--a2), var(--accent));
      color: #fff; border: none; border-radius: 10px;
      font-family: system-ui,sans-serif; font-size: .88rem;
      cursor: pointer; text-decoration: none; white-space: nowrap;
      transition: opacity .18s;
    }
    .cont-btn:hover { opacity: .87; }

    /* ── SEARCH ────────────────────────────────────────────────────── */
    .search-wrap {
      max-width: 820px;
      margin: 1.4rem auto .4rem;
      padding: 0 1rem;
    }
    #search {
      width: 100%; padding: .62rem 1rem;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--card); color: var(--text);
      font-family: Georgia,serif; font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    #search:focus { border-color: var(--a2); box-shadow: 0 2px 12px rgba(142,66,24,.1); }
    #search::placeholder { color: var(--muted); opacity:.75; font-family: system-ui,sans-serif; }

    /* ── GALLERY GRID — all names flat ─────────────────────────────── */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
      gap: .7rem;
      max-width: 1300px;
      margin: 0 auto;
      padding: .6rem 1rem 3rem;
    }

    .name-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 1rem .65rem .85rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      text-decoration: none; color: var(--text);
      cursor: pointer;
      transition: transform .17s, border-color .17s, box-shadow .17s;
      min-height: 78px;
    }
    .name-card:hover {
      transform: translateY(-3px);
      border-color: var(--a2);
      box-shadow: 0 10px 28px rgba(49,27,16,.12);
    }
    .name-ar {
      font-size: 1.12rem;
      line-height: 1.5;
      color: var(--accent);
    }

    /* Search filter */
    .name-card.hidden { display: none; }

    /* ── NO RESULTS ────────────────────────────────────────────────── */
    #no-results {
      display: none;
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-family: system-ui,sans-serif;
    }

    /* ── FOOTER ────────────────────────────────────────────────────── */
    .footer {
      text-align: center; padding: 1.2rem 1rem 2rem;
      color: var(--muted); font-family: system-ui,sans-serif; font-size: .8rem;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ────────────────────────────────────────────────── */
    @media (max-width:560px) {
      .hero { padding: 1.8rem 1rem 1.4rem; }
      #gallery { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: .55rem; padding: .5rem .65rem 2.5rem; }
      .name-card { padding: .85rem .5rem .7rem; min-height: 68px; }
      .name-ar { font-size: .98rem; }
      #banner { margin: 1rem .65rem 0; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>بأسمائه نحيا</h1>
    <p class="hero-sub">اضغط على أي اسم للانتقال مباشرةً إلى قراءته</p>

    <!-- shown only when a saved reading position exists -->
    <div id="banner">
      <div class="banner-txt">
        <strong>استمر من حيث توقّفت</strong>
        <span id="banner-detail"> — جلسة قراءة محفوظة</span>
      </div>
      <a id="cont-link" href="reader.html" class="cont-btn">← استمرار القراءة</a>
    </div>
  </header>

  <div class="search-wrap">
    <input type="search" id="search" placeholder="ابحث عن اسم…" autocomplete="off" aria-label="بحث">
  </div>

  <main id="gallery" aria-label="أسماء الله الحسنى"></main>
  <div id="no-results">لا توجد نتائج مطابقة</div>

  <footer class="footer">
    كتاب <strong>بأسمائه نحيا</strong> — فقه الحب والتقوى في الأسماء الحسنى &nbsp;|&nbsp;
    <a href="reader.html">فتح القارئ</a>
  </footer>

<script>

  { ar:'ٱلْقَاهِرُ ٱلْقَهَّارُ',          p:2, c:10 },
  { ar:'ٱلدَّيَّانُ',                     p:2, c:14 },
  { ar:'ٱلسَّيِّدُ',                      p:2, c:17 },
  { ar:'ٱلْكَبِيرُ',                      p:2, c:20 },
  { ar:'ٱللَّهُ ٱلْإِلَٰهُ',              p:2, c:23 },
  { ar:'ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ',    p:2, c:28 },
  { ar:'الرَّب',                          p:2, c:31 },
  /* Part 3 — التنزيه والعلو */
  { ar:'ٱلْعَظِيمُ',                          p:3, c:1  },

  { ar:'ٱلْأَحَدُ ٱلْوَاحِدُ',                p:3, c:10 },

  { ar:'ٱلْحَكَمُ',   p:4, c:39 },
  { ar:'ٱلْكَفِيلُ',  p:4, c:43 },
  { ar:'ٱلْكَافِي',   p:4, c:47 },
  /* Part 5 — القدرة والخلق */
  { ar:'ٱلْقَدِيرُ',            p:5, c:1  },
  { ar:'ٱلْقَادِرُ',            p:5, c:5  },
  { ar:'ٱلْمُقْتَدِرُ',         p:5, c:8  },
  { ar:'ٱلْقَوِيُّ',            p:5, c:11 },

  { ar:'الْأَوَّلُ وَالْآخِرُ وَالظَّاهِرُ وَالْبَاطِنُ', p:7, c:1  },
  { ar:'الْقَرِيبُ الْمُجِيبُ الشَّافِي',                 p:7, c:5  },

  { ar:'السَّلَام',                                       p:7, c:17 },
  { ar:'الغَنِيّ',                                        p:7, c:20 },
  { ar:'ٱلْوَلِيُّ ٱلْمَوْلَى',                          p:7, c:23 },
  { ar:'الهَادِي',                                        p:7, c:28 },
  { ar:'ٱلْمُهَيْمِنُ ٱلْوَاسِعُ ٱلْمُحِيطُ',           p:7, c:32 },
];

/* ── BUILD GALLERY ─────────────────────────────────────────────────── */
function buildGallery() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = NAMES.map(n =>
    `<a class="name-card"
        href="reader.html?part=${n.p}&amp;start=${n.c}"
        data-name="${n.ar}"
        data-part="${n.p}"
        aria-label="${n.ar}">
       <span class="name-ar">${n.ar}</span>
     </a>`
  ).join('');

  /* On hover / touch-start, upgrade the part-file prefetch to a
     high-priority fetch so by the time the click fires the bytes
     are already in the HTTP cache. Each part is only warmed once. */
  const warmed = new Set();
  function warmPart(p) {
    if (warmed.has(p)) return;
    warmed.add(p);
    fetch(`chapters/part${p}-full.html`, { cache: 'force-cache', priority: 'high' })
      .catch(() => {});
  }
  gallery.addEventListener('pointerenter', e => {
    const card = e.target.closest && e.target.closest('.name-card');
    if (card) warmPart(+card.dataset.part);
  }, { capture: true, passive: true });
  gallery.addEventListener('touchstart', e => {
    const card = e.target.closest && e.target.closest('.name-card');
    if (card) warmPart(+card.dataset.part);
  }, { capture: true, passive: true });
}

/* ── CONTINUE READING BANNER ───────────────────────────────────────── */
function initBanner() {
  const GLOB_K = 'asma_v3_global';
  let saved;
  try { const r = localStorage.getItem(GLOB_K); saved = r ? JSON.parse(r) : null; } catch(_){}
  if (!saved || !saved.partId) return;

  const banner = document.getElementById('banner');
  const link   = document.getElementById('cont-link');

  // Build the restore URL: part + start chunk + restore flag
  link.href = `reader.html?part=${saved.partId}&start=${saved.maxChunk || 1}&restore`;

  banner.classList.add('visible');
}

/* ── LIVE SEARCH ───────────────────────────────────────────────────── */
function initSearch() {
  const input  = document.getElementById('search');
  const noRes  = document.getElementById('no-results');
  const cards  = () => document.querySelectorAll('.name-card');

  function normalize(s) {
    return s.replace(/[\u064B-\u065F\u0670]/g, '').replace(/\s+/g,'');
  }

  input.addEventListener('input', () => {
    const q = normalize(input.value.trim());
    let anyVisible = false;
    cards().forEach(card => {
      const name = normalize(card.dataset.name || '');
      const match = !q || name.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) anyVisible = true;
    });
    noRes.style.display = (!q || anyVisible) ? 'none' : 'block';
  });
}

/* ── SERVICE WORKER (offline cache → instant repeat visits) ───────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* ── INIT ──────────────────────────────────────────────────────────── */
buildGallery();
initBanner();
initSearch();

})();
</script>
</body>
</html>
